#######################################################################################
# Jupyter Book configuration for "CMU Intro to Computer Music"
# Course: 15-322 / 15-622, Carnegie Mellon University
#
# Docs: https://jupyterbook.org/customize/config.html
#######################################################################################

# Book metadata
title: CMU Intro to Computer Music
author: "Chris Donahue"
email: "chrisdonahue@cmu.edu"
copyright: "2026 Chris Donahue. All rights reserved."
logo: ""                                  # path to a logo image, e.g. content/images/logo.png
exclude_patterns: [_build, "**.ipynb_checkpoints"]
only_build_toc_files: true

#######################################################################################
# Execution settings ('auto' executes any notebook that is missing outputs)
execute:
  execute_notebooks: 'auto'
  # Manim pages render several clips per notebook and CI runners are slow;
  # 180s was too tight.
  timeout: 600
  # Run each notebook in a temp dir: the repo's `pyquist/` and
  # `content/pyquist/` directories shadow the installed pyquist package when
  # they're the execution CWD, breaking `import pyquist` at build time. The
  # notebooks read no files by relative path, so temp execution is safe.
  run_in_temp: true

#######################################################################################
# Parse and render settings
parse:
  myst_enable_extensions:
    - amsmath
    - attrs_inline
    - colon_fence
    - deflist
    - dollarmath
    - linkify
    - smartquotes
    - substitution
    - tasklist
  myst_url_schemes: [mailto, http, https]

#######################################################################################
# HTML-specific settings
html:
  favicon: ""
  navbar_number_sections: true
  navbar_footer_text: 'Powered by <a href="https://jupyterbook.org">Jupyter Book</a>'
  home_page_in_navbar: true
  baseurl: ""
  use_multitoc_numbering: true

repository:
  url: "https://github.com/gclef-cmu/icmbook"
  path_to_book: ""
  branch: main

# NOTE: no launch buttons anywhere, on purpose. live-cells.js mounts editors
# at page load, and thebe is wired solely by sphinx.config.thebe_config below;
# a launch_buttons theme option would only draw a dead rocket menu. A
# top-level `launch_buttons:` section would be ignored anyway —
# sphinx.config.html_theme_options REPLACES the computed theme options.

#######################################################################################
# Advanced and power-user settings
sphinx:
  extra_extensions:
    - sphinxcontrib.inkscapeconverter
    - sphinx_exercise
    - sphinx_proof
    # Autodoc: the API pages under content/pyquist/api/ pull the Pyquist
    # reference straight from the installed package's docstrings.
    - sphinx.ext.autodoc
    - sphinx.ext.napoleon
    - sphinx.ext.viewcode
  # Book-specific extensions (sources in _ext/):
  #   icm_roles       — inline roles {vocab} and {unit}
  #   icm_glossary    — groups the Glossary into an A–Z index
  #   icm_audio       — the {audio} directive and role (captioned players)
  #   icm_figure      — {figure} that also takes a simple image+caption body
  #   icm_pyquist     — the {pyquist} role: links into the Pyquist API reference
  #   icm_interactive — the {interactive} directive (live companion notebooks)
  #   icm_animation   — the {animation} directive (watch-only manim clips)
  #   icm_schedule    — the {schedule} directive (course schedule table)
  local_extensions:
    icm_roles: _ext/
    icm_glossary: _ext/
    icm_audio: _ext/
    icm_figure: _ext/
    icm_pyquist: _ext/
    icm_interactive: _ext/
    icm_animation: _ext/
    icm_schedule: _ext/
  config:
    # A notebook execution error is only a warning by default, which lets a
    # broken page deploy — fail the build instead.
    nb_execution_raise_on_error: true

    # Only auto-linkify explicit URLs — fuzzy mode catches things like
    # `pyquist.web` (`.web` is a real TLD) and makes broken links.
    myst_linkify_fuzzy_links: false

    # ---- Collapsible code cells (myst-nb) ---------------------------------
    # Relabel the `hide-input` toggle: every hidden cell holds setup code, so
    # "setup" beats the default "Show/Hide code cell source".
    nb_code_prompt_show: "Show setup"
    nb_code_prompt_hide: "Hide setup"

    # 404.html: served by GitHub Pages for unknown URLs. vendor/ holds the
    # live-code runtime — the thebe bundles must NOT live in _static (every
    # _static .js is auto-registered as a page script), and the service
    # worker must sit at the site root for root scope.
    html_extra_path: ["404.html", "vendor"]

    # ---- Autodoc / Napoleon -----------------------------------------------
    autodoc_member_order: "bysource"   # follow source order, not alphabetical
    autodoc_typehints: "description"   # render type hints in the param list
    autodoc_default_options:
      members: true
      show-inheritance: true
      inherited-members: false
      undoc-members: false
    napoleon_google_docstring: true
    napoleon_numpy_docstring: true
    napoleon_use_param: true
    napoleon_use_rtype: true
    html_theme_options:
      use_download_button: false
      # Keep the landing page out of the left sidebar — it's already
      # reachable via the logo/title link.
      home_page_in_toc: false
      default_mode: light
      # `launch_buttons` is deliberately absent: it would bake a rocket menu
      # into every notebook page that then has to be stripped at runtime
      # (flashing on refresh, stuck on watch-only animation pages). The
      # sphinx-thebe fork emits its config tag via thebe_config below,
      # independent of launch buttons.
      repository_url: https://github.com/gclef-cmu/icmbook
      repository_branch: main
    html_sidebars:
      "**":
        - navbar-logo.html
        - icon-links.html
        - search-field.html
        - sbt-sidebar-nav.html
    html_js_files:
      # require.js first: the TeachBooks live-code setup expects it.
      - https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.4/require.min.js
      - course-nav.js
      - audio-chip.js
      # Button-free live code: editors mount at page load, the kernel stack
      # loads on the first Run. live-cells.css pairs with it.
      - live-cells.js
    thebe_config:
      use_thebe_lite: true
      # The extension would copy book SOURCE files into _build/html for the
      # kernel; publish none of them (the kernel only needs the wheels). The
      # dot patterns matter: `**` alone does NOT match dotfiles, which would
      # publish .git/ onto the site.
      exclude_patterns: ["**", ".*", ".*/**"]
    # Reusable text snippets — insert with {{ name }} in any page.
    myst_substitutions:
      course: "15-322 / 15-622 Introduction to Computer Music"
      pyquist: "[Pyquist](https://pyquist.org)"
      pyquist_url: "https://pyquist.org"
    mathjax3_config:
      loader:
        load:
          - "[tex]/configMacros"
          - "[tex]/html"
          - "[tex]/cancel"
      tex:
        packages:
          "+":
            - configMacros
            - html
            - cancel
        macros:
          "blue": ["\\class{blue}{#1}", 1]
          "red": ["\\class{red}{#1}", 1]
          "orange": ["\\class{orange}{#1}", 1]
          "purple": ["\\class{purple}{#1}", 1]
          "green": ["\\class{green}{#1}", 1]
          "dkorange": ["\\class{dkorange}{#1}", 1]
          "cyan": ["\\class{cyan}{#1}", 1]
          "magenta": ["\\class{magenta}{#1}", 1]
          "yellow": ["\\class{yellow}{#1}", 1]
          "peagreen": ["\\class{peagreen}{#1}", 1]
          "darkblue": ["\\class{darkblue}{#1}", 1]
          "darkorange": ["\\class{darkorange}{#1}", 1]
    latex_elements:
      extrapackages: "\\usepackage{cancel,color}\n\\usepackage{epigrafica}\n"
      preamble: \input{colormap.tex.txt}
      tableofcontents: ""
    latex_additional_files: ["colormap.tex.txt", "Alon.cls", "epigrafica.sty"]
    latex_docclass:
      howto: "alon"
      manual: "alon"
      latex_toplevel_sectioning: 'part'

latex:
  use_jupyterbook_latex: false
  latex_engine: xelatex
  latex_documents:
    targetname: icmbook.tex

bibtex_bibfiles:
  - content/references.bib
