#######################################################################################
# Jupyter Book configuration for "Computer Music Principles"
# Course: 15-322 / 15-622, Carnegie Mellon University
#
# Docs: https://jupyterbook.org/customize/config.html
#######################################################################################

# Book metadata
title: Computer Music Principles
author: "Chris Donahue"
email: "chrisdonahue@cmu.edu"
copyright: "2026 Chris Donahue. All rights reserved."
logo: ""                                  # path to a logo image, e.g. content/images/logo.png
exclude_patterns: [_build, "**.ipynb_checkpoints"]
only_build_toc_files: true

#######################################################################################
# Execution settings
#   'auto' executes any notebook that is missing outputs. The placeholder MyST
#   notebooks below still use a stand-in API and would fail, so they are excluded
#   until rewritten against the real Pyquist API.
execute:
  execute_notebooks: 'auto'
  timeout: 180

#######################################################################################
# Parse and render settings
parse:
  myst_enable_extensions:
    - amsmath
    - colon_fence
    - deflist
    - dollarmath
    - linkify
    - smartquotes
    - substitution
    - tasklist
  myst_url_schemes: [mailto, http, https]

#######################################################################################
# HTML-specific settings
html:
  favicon: ""
  navbar_number_sections: true
  navbar_footer_text: 'Powered by <a href="https://jupyterbook.org">Jupyter Book</a>'
  home_page_in_navbar: true
  baseurl: ""
  use_multitoc_numbering: true

repository:
  url: "https://github.com/jiaweil6/icmbook"
  path_to_book: ""
  branch: main

# NOTE: do not add a top-level `launch_buttons:` section here. Because we set
# sphinx.config.html_theme_options explicitly below, that dict REPLACES the
# theme options Jupyter Book computes (including any launch_buttons), so the
# Live Code button must be configured inside html_theme_options directly.

#######################################################################################
# Advanced and power-user settings
sphinx:
  extra_extensions:
    - sphinxcontrib.inkscapeconverter
    - sphinx_exercise
    - sphinx_proof
    # Pull the Pyquist API reference straight from the installed package's
    # docstrings. The API pages under content/pyquist/api/ use `{eval-rst}`
    # blocks to invoke these directives, mirroring the upstream
    # gclef-cmu/pyquist `docs/api/*.rst` layout. Whenever Pyquist's main
    # branch updates, the next book build picks it up.
    - sphinx.ext.autodoc
    - sphinx.ext.napoleon
    - sphinx.ext.viewcode
  # Book-specific extensions:
  #   icm_roles    — inline roles ({vocab}, {unit}); source in _ext/icm_roles.py
  #   icm_glossary — groups the Glossary into an A–Z index; _ext/icm_glossary.py
  #   icm_audio    — the {audio} directive (captioned player); _ext/icm_audio.py
  #   icm_figure   — {figure} that also takes a simple image+caption body
  local_extensions:
    icm_roles: _ext/
    icm_glossary: _ext/
    icm_audio: _ext/
    icm_figure: _ext/
  config:
    # Only auto-linkify strings that include an explicit URL scheme
    # (e.g. https://example.com). Without this, MyST's "fuzzy" linkify
    # mode catches things like `pyquist.web` — `.web` is a real TLD —
    # and wraps the heading in a broken external link.
    myst_linkify_fuzzy_links: false

    # Copy the standalone 404 page to the site root. GitHub Pages serves
    # /404.html for any unknown URL.
    # vendor/ holds the live-code runtime (make vendor-thebe): the thebe
    # bundles must NOT live in _static (Jupyter Book auto-registers all
    # _static *.js as page scripts, eagerly executing worker-only chunks),
    # and service-worker.js must sit at the site root for root scope.
    html_extra_path: ["404.html", "vendor"]

    # ---- Autodoc / Napoleon -----------------------------------------------
    autodoc_member_order: "bysource"   # follow source order, not alphabetical
    autodoc_typehints: "description"   # render type hints in the param list
    autodoc_default_options:
      members: true
      show-inheritance: true
      inherited-members: false
      undoc-members: false
    napoleon_google_docstring: true
    napoleon_numpy_docstring: true
    napoleon_use_param: true
    napoleon_use_rtype: true
    html_theme_options:
      use_download_button: false
      # Show the Preface (root page) as the first item in the left sidebar.
      home_page_in_toc: true
      default_mode: light
      # Live code (Phase 1): in-browser execution via thebe-lite + Pyodide.
      # Uses the TeachBooks fork of sphinx-thebe (pinned in environment.yml),
      # which vendors the thebe-lite bundle so the site self-hosts everything
      # except Pyodide itself (CDN, pinned via _static/thebe-pyodide-pin.js).
      # The button only renders on notebook pages (currently the template
      # notebook); .md chapter pages have no executable cells.
      repository_url: https://github.com/jiaweil6/icmbook
      repository_branch: main
      launch_buttons:
        thebe: true
    html_sidebars:
      "**":
        - navbar-logo.html
        - icon-links.html
        - search-field.html
        - sbt-sidebar-nav.html
    html_js_files:
      # require.js first: the TeachBooks live-code setup expects it.
      - https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.4/require.min.js
      - course-nav.js
      - audio-chip.js
      # Phase 2: button-free live code. Editors mount silently at page load
      # (thebe core bundle from vendor/, idle-time), so notebook cells are
      # editable immediately; the kernel stack (thebe-lite server, Pyodide
      # from the CDN, wheels) loads only on the first Run, and the Pyodide/
      # kernel version pins live inside this file. Prose pages exit
      # immediately. Also restyles cell outputs (audio -> book chip cards).
      # live-cells.css pairs with it (auto-included from _static).
      - live-cells.js
    thebe_config:
      use_thebe_lite: true
      # The TeachBooks extension copies book SOURCE files into _build/html so
      # the kernel can read them. We publish none of them: the kernel only
      # needs the wheels in _static/wheels (built by `make wheels`), and this
      # keeps icm-text/, pyquist/, content sources, etc. off the public site.
      # The dot patterns matter — `**` alone does NOT match dotfiles, which
      # would otherwise publish .git/ onto the site.
      exclude_patterns: ["**", ".*", ".*/**"]
    # Reusable text snippets — insert with {{ name }} in any page.
    myst_substitutions:
      course: "15-322 / 15-622 Introduction to Computer Music"
      pyquist: "[Pyquist](https://pyquist.org)"
      pyquist_url: "https://pyquist.org"
    mathjax3_config:
      loader:
        load:
          - "[tex]/configMacros"
          - "[tex]/html"
          - "[tex]/cancel"
      tex:
        packages:
          "+":
            - configMacros
            - html
            - cancel
        macros:
          "blue": ["\\class{blue}{#1}", 1]
          "red": ["\\class{red}{#1}", 1]
          "orange": ["\\class{orange}{#1}", 1]
          "purple": ["\\class{purple}{#1}", 1]
          "green": ["\\class{green}{#1}", 1]
          "dkorange": ["\\class{dkorange}{#1}", 1]
          "cyan": ["\\class{cyan}{#1}", 1]
          "magenta": ["\\class{magenta}{#1}", 1]
          "yellow": ["\\class{yellow}{#1}", 1]
          "peagreen": ["\\class{peagreen}{#1}", 1]
          "darkblue": ["\\class{darkblue}{#1}", 1]
          "darkorange": ["\\class{darkorange}{#1}", 1]
    latex_elements:
      extrapackages: "\\usepackage{cancel,color}\n\\usepackage{epigrafica}\n"
      preamble: \input{colormap.tex.txt}
      tableofcontents: ""
    latex_additional_files: ["colormap.tex.txt", "Alon.cls", "epigrafica.sty"]
    latex_docclass:
      howto: "alon"
      manual: "alon"
      latex_toplevel_sectioning: 'part'

latex:
  use_jupyterbook_latex: false
  latex_engine: xelatex
  latex_documents:
    targetname: icmbook.tex

bibtex_bibfiles:
  - content/references.bib
