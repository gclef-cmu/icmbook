# Conda environment for building "CMU Intro to Computer Music".
#
#   conda env create -f environment.yml
#   conda activate icmbook
#   make book
#
name: icmbook
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.11
  - pip
  # Pin to the 1.x line: this book uses the classic Sphinx-based config
  # (_config.yml / _toc.yml). Jupyter Book 2.x uses a different format.
  - jupyter-book<2
  - jupyter
  - ipython
  - numpy
  - scipy
  - matplotlib
  - pysoundfile
  # Interactive-widget stack (plotly FigureWidget + ipywidgets, e.g. 5.2).
  # Build-time only here; the browser kernel installs them per-page from
  # PyPI via live-cells.js pypiFeatures.
  - plotly
  - anywidget
  - sphinx-exercise
  - sphinx-proof
  - pip:
      - sphinxcontrib-svg2pdfconverter
      # Live code: TeachBooks fork of sphinx-thebe, pinned to a commit (the
      # fork publishes no tags). CAUTION: conda installs upstream sphinx-thebe
      # first (same dist name/version), so pip SKIPS this line as already
      # satisfied. After creating/updating the env, force it:
      #   pip install --force-reinstall --no-deps "sphinx-thebe @ git+...@<pin>"
      # `make book` refuses to build with upstream (check-thebe-fork), and CI
      # runs the force-install explicitly.
      - sphinx-thebe @ git+https://github.com/TeachBooks/Sphinx-Thebe@1f3a80969622b7d63f48f05d8769f5cb933202a0
      # Needed by the fork's copy_over_files but not declared in its metadata.
      - wcmatch
      # Pyquist, the course audio library — executes notebook pages at build
      # time and feeds autodoc. Installed from the pinned submodule; run
      # `git submodule update --init` after cloning.
      - -e ./pyquist
      # icm-widgets: the matplotlib house style + palette; also wheeled into
      # _static/wheels for the browser kernel.
      - -e ./tools/icm_widgets
      # icm-plotly: house plotly template + the widget cells' build/live
      # display switch; also wheeled into _static/wheels.
      - -e ./tools/icm_plotly
      # Manim + icm-anim: the {animation} directive's engine. Build-only —
      # manim has no Pyodide build, so it's never wheeled for the browser.
      # Encoding uses manim's bundled PyAV (no system ffmpeg); MathTex scenes
      # need latex/dvisvgm (TeX Live locally, texlive apt in CI).
      - manim==0.20.1
      - -e ./tools/icm_anim
