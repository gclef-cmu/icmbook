name: deploy-book

on:
  push:
    branches:
      - main
  workflow_dispatch:
  # Fired by a workflow in the Pyquist repo when its main branch updates,
  # so this book rebuilds within seconds of an upstream API change.
  repository_dispatch:
    types: [pyquist-updated]
  # Nightly safety net at 07:17 UTC — picks up any Pyquist change that
  # didn't dispatch (e.g. token rotation, merged via a non-push path).
  schedule:
    - cron: "17 7 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-book:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Pyquist's `device` module imports `sounddevice`, which dlopens the
      # PortAudio C library at import time. autodoc imports every module it
      # documents, so without this system package the build dies with
      # `OSError: PortAudio library not found`. (Same package the upstream
      # Pyquist README's Linux install section calls out.)
      - name: Install PortAudio (system dep of sounddevice)
        run: sudo apt-get update && sudo apt-get install -y libportaudio2

      - name: Set up Conda environment
        uses: conda-incubator/setup-miniconda@v4
        with:
          miniforge-version: latest
          environment-file: environment.yml
          activate-environment: icmbook
          auto-activate-base: false
          channels: conda-forge
          channel-priority: strict
          conda-remove-defaults: "true"

      # The autodoc-driven API pages under content/pyquist/api/ pull their
      # content from the installed pyquist package, so every build needs the
      # latest commit. The env file pins pyquist to its git URL; this step
      # force-reinstalls from HEAD so a cached wheel can't shadow a new
      # docstring or signature on a dispatch or nightly run.
      - name: Refresh Pyquist from latest source
        run: |
          pip install --upgrade --force-reinstall --no-deps \
            git+https://github.com/gclef-cmu/pyquist.git
          python -c "import pyquist, os; print('pyquist at', os.path.dirname(pyquist.__file__))"

      - name: Build the book
        run: make book

      - name: Disable Jekyll processing
        run: touch _build/html/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4