name: deploy-book

on:
  push:
    branches:
      - main
  workflow_dispatch:
  # Builds are deterministic: the book only changes when the repo (incl. the
  # pinned pyquist submodule) does.

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-book:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        # NOTE: do NOT set `submodules: true` — icm-text is PRIVATE and the
        # default GITHUB_TOKEN can't read it. The build doesn't need it (its
        # prose is already split into content/ch*/); only pyquist is fetched
        # below, over HTTPS so no SSH key is needed.

      - name: Fetch pyquist submodule (public, over HTTPS)
        run: |
          git config submodule.pyquist.url https://github.com/gclef-cmu/pyquist.git
          # --remote follows the branch in .gitmodules (currently
          # browser-recording); revert to a plain `--init` pin once merged.
          git submodule update --init --remote pyquist

      # autodoc imports pyquist.device, whose sounddevice dependency dlopens
      # PortAudio at import time — without this the build dies.
      - name: Install PortAudio (system dep of sounddevice)
        run: sudo apt-get update && sudo apt-get install -y libportaudio2

      # Manim's MathTex shells out to latex/dvisvgm ({animation} clips).
      # Video encoding uses manim's bundled PyAV, so no ffmpeg.
      - name: Install TeX Live (manim MathTex dep)
        run: sudo apt-get install -y texlive texlive-latex-extra dvisvgm

      # Persist the jupyter-cache so a push only executes the notebooks it
      # changed. jupyter-cache invalidates per-notebook by content hash; the
      # KEY busts only when the execution environment changes (stale outputs
      # from an old environment would otherwise be served forever). The sha
      # suffix saves an updated cache each run.
      - name: Restore notebook execution cache
        uses: actions/cache@v4
        with:
          path: _build/.jupyter_cache
          key: jcache-${{ hashFiles('environment.yml', '_config.yml', 'tools/**', 'pyquist/pyquist/**') }}-${{ github.sha }}
          restore-keys: |
            jcache-${{ hashFiles('environment.yml', '_config.yml', 'tools/**', 'pyquist/pyquist/**') }}-

      - name: Set up Conda environment
        uses: conda-incubator/setup-miniconda@v4
        with:
          miniforge-version: latest
          environment-file: environment.yml
          activate-environment: icmbook
          auto-activate-base: false
          channels: conda-forge
          channel-priority: strict
          conda-remove-defaults: "true"

      # conda already installed upstream sphinx-thebe (same dist name AND
      # version as the fork), so pip silently skips environment.yml's pin —
      # and upstream-built pages break the live-code layer in the browser.
      # Force the fork in; `make book`'s check-thebe-fork guards this too.
      - name: Force-install TeachBooks sphinx-thebe fork
        run: |
          pip install --force-reinstall --no-deps \
            "sphinx-thebe @ git+https://github.com/TeachBooks/Sphinx-Thebe@1f3a80969622b7d63f48f05d8769f5cb933202a0"

      # Confirm autodoc will introspect the submodule checkout, not a stray
      # copy from a wheel cache.
      - name: Verify Pyquist resolves to the submodule
        run: |
          python -c "import pyquist; print('pyquist at', pyquist.__path__[0])"

      - name: Build the book
        run: make book

      - name: Disable Jekyll processing
        run: touch _build/html/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4